<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>絕區零小助手 - 驗證中心</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://static.geetest.com/static/tools/gt.js"></script>
    <script src="https://static.geetest.com/v4/gt4.js"></script>
    <style>
      :root {
        --primary: #facc15; /* ZZZ Yellow */
        --primary-dark: #ca8a04;
        --bg-dark: #09090b;
        --glass-bg: rgba(24, 24, 27, 0.8);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text-main: #fafafa;
        --text-dim: #a1a1aa;
      }

      * {
        box-sizing: border-box;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      body {
        font-family: "Outfit", sans-serif;
        padding: 0;
        margin: 0;
        background-color: var(--bg-dark);
        color: var(--text-main);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
        position: relative;
      }

      /* Animated Background Gradients - ZZZ Style */
      body::before,
      body::after {
        content: "";
        position: absolute;
        width: 60vmax;
        height: 60vmax;
        filter: blur(100px);
        opacity: 0.2;
        z-index: -1;
        animation: move 20s infinite alternate;
      }

      body::before {
        background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
        top: -20%;
        left: -10%;
      }

      body::after {
        background: radial-gradient(circle, #ef4444 0%, transparent 70%);
        bottom: -20%;
        right: -10%;
        animation-delay: -7s;
      }

      @keyframes move {
        from {
          transform: translate(0, 0) scale(1);
        }
        to {
          transform: translate(15%, 15%) scale(1.3);
        }
      }

      .container {
        width: 95%;
        max-width: 500px;
        perspective: 1200px;
      }

      .card {
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        padding: 4rem 2.5rem;
        border-radius: 2.5rem;
        border: 1px solid var(--glass-border);
        box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.7);
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      /* Diagonal Stripe Pattern Emulating ZZZ UI */
      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 6px;
        background: repeating-linear-gradient(
          -45deg,
          var(--primary),
          var(--primary) 10px,
          var(--bg-dark) 10px,
          var(--bg-dark) 20px
        );
      }

      .logo {
        font-size: 3rem;
        font-weight: 800;
        background: linear-gradient(135deg, #fff 40%, var(--primary) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0.75rem;
        letter-spacing: -0.04em;
        text-transform: uppercase;
      }

      .subtitle {
        color: var(--text-dim);
        font-size: 1.1rem;
        margin-bottom: 3rem;
        font-weight: 400;
        letter-spacing: 0.05em;
      }

      .status-msg {
        font-size: 1.15rem;
        color: var(--primary);
        margin: 2rem 0;
        min-height: 30px;
        font-weight: 500;
      }

      #captcha {
        margin: 2rem 0;
        display: flex;
        justify-content: center;
        min-height: 60px;
      }

      .success-area {
        display: none;
        animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .check-icon {
        font-size: 5rem;
        color: var(--primary);
        margin-bottom: 1.5rem;
        text-shadow: 0 0 20px rgba(250, 204, 21, 0.4);
      }

      .btn-discord {
        margin-top: 2rem;
        display: inline-block;
        background: var(--primary);
        color: var(--bg-dark);
        padding: 1.2rem 3rem;
        border-radius: 1rem;
        text-decoration: none;
        font-weight: 800;
        font-size: 1.1rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        box-shadow: 0 10px 30px rgba(250, 204, 21, 0.3);
        transform: skewX(-10deg);
      }

      .btn-discord:hover {
        background: #fff;
        transform: skewX(-10deg) scale(1.05) translateY(-2px);
        box-shadow: 0 15px 40px rgba(250, 204, 21, 0.5);
      }

      .footer {
        margin-top: 3rem;
        font-size: 0.9rem;
        color: var(--text-dim);
        opacity: 0.4;
        font-weight: 300;
      }

      /* Loading Spinner */
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(250, 204, 21, 0.1);
        border-radius: 50%;
        border-top-color: var(--primary);
        animation: spin 1s infinite cubic-bezier(0.5, 0, 0.5, 1);
        margin: 0 auto;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Error Styles */
      .error-pre {
        background: rgba(0, 0, 0, 0.5);
        padding: 1.5rem;
        border-radius: 1rem;
        font-size: 0.85rem;
        color: #ef4444;
        text-align: left;
        overflow: auto;
        margin-top: 1.5rem;
        border: 1px solid rgba(239, 68, 68, 0.2);
        font-family: monospace;
      }
      .retry-btn {
        margin-top: 10px;
        padding: 8px 16px;
        background-color: #f4b400;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        font-family: inherit;
        transition: background-color 0.2s;
      }
      .retry-btn:hover {
        background-color: #d89f00;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div id="main-ui">
          <div class="logo">Verification</div>
          <div class="subtitle">絕區零小助手 - 登入驗證</div>

          <div id="loading-spinner">
            <div class="spinner"></div>
            <div class="status-msg">正在初始化加密環境...</div>
          </div>

          <div id="captcha"></div>
          <div id="status-text" class="status-msg" style="display: none"></div>
        </div>

        <div id="success-ui" class="success-area">
          <div class="check-icon">CORRECT</div>
          <h2 style="margin: 0; color: #fff; font-size: 2rem; font-weight: 800">
            驗證成功
          </h2>
          <p
            style="
              color: var(--text-dim);
              margin: 1.5rem 0 2.5rem;
              font-size: 1.1rem;
            "
          >
            結果已加密傳送至機器人，您可以關閉此分頁繼續操作。
          </p>
          <a href="https://discord.com/app" class="btn-discord">回到 Discord</a>
        </div>

        <div
          id="manual-area"
          style="
            display: none;
            margin-top: 2.5rem;
            border-top: 1px solid var(--glass-border);
            padding-top: 2.5rem;
          "
        >
          <p style="font-size: 1rem; color: #ef4444; font-weight: 600">
            自動通訊失敗，請複製此加密代碼：
          </p>
          <pre id="out-json" class="error-pre"></pre>
        </div>

        <div class="footer">
          Protocol: Secure-Verification-v4 | Powered by Yeci
        </div>
      </div>
    </div>

    <script>
      const statusText = document.getElementById("status-text");
      const loadingSpinner = document.getElementById("loading-spinner");
      const mainUi = document.getElementById("main-ui");
      const successUi = document.getElementById("success-ui");
      const manualArea = document.getElementById("manual-area");
      const outJson = document.getElementById("out-json");

      const params = new URLSearchParams(window.location.search);
      const captchaId = params.get("captchaId");
      const riskType = params.get("riskType");
      const riskTypeData = params.get("risk_type");
      const challenge = params.get("challenge");
      const sessionId = params.get("session");
      const successParam = params.get("success");
      const newCaptchaParam = params.get("new_captcha");
      const aigisSessionId = params.get("aigisSessionId");

      console.log("[Verification] Params:", {
        captchaId,
        riskType,
        challenge,
        sessionId,
        successParam,
        newCaptchaParam,
        aigisSessionId,
      });

      if (!captchaId || !riskType || !challenge) {
        statusText.textContent = "❌ 解析參數失敗，請返回 Discord 重新執行指令";
        statusText.style.display = "block";
        loadingSpinner.style.display = "none";
      } else {
        initVerification();
      }

      function initVerification() {
        // Decision logic for Geetest version based on Aigis riskType (mmt_type)
        // 1 = Geetest v3, 2 = Geetest v4
        // Version detection: Challenge length 32 is v3, anything else (or missing) is likely v4
        let version = 4;
        if (challenge && challenge.length === 32 && challenge !== "undefined") {
          version = 3;
        } else if (riskType === "1" && (!challenge || challenge.length === 32)) {
          version = 3;
        } else if (riskType === "2") {
          version = 4;
        }

        console.log(`[Verification] Detected Version: v${version} (riskType: ${riskType}, challenge length: ${challenge ? challenge.length : 0})`);

        if (version === 4) {
          console.log("[Verification] Using Geetest v4");
          window.initGeetest4(
            {
              captchaId: captchaId,
              language: "zho-tw",
              product: "float",
              https: true,
              riskType: riskTypeData,
              userInfo: JSON.stringify({ session_id: aigisSessionId }),
            },
            function (captchaObj) {
              loadingSpinner.style.display = "none";
              captchaObj.appendTo("#captcha");
              captchaObj.onSuccess(() => {
                const result = captchaObj.getValidate();
                // Inject context data for backend login.ts
                result.session_id = aigisSessionId;
                result.risk_type = riskTypeData;
                result.riskType = riskType;
                handleCallback(result);
              });
              captchaObj.onError((err) => {
                console.error("[Geetest v4] Error:", err);
                statusText.textContent = `❌ Geetest v4 載入失敗: ${err.msg || "網路錯誤"}`;
                statusText.style.display = "block";
                loadingSpinner.style.display = "none";
              });
            },
          );
        } else {
          const isOversea = aigisSessionId && (aigisSessionId.endsWith("_SG") || aigisSessionId.endsWith("_oversea"));
          const apiServer = isOversea ? "api-na.geetest.com" : "api.geetest.com";
          console.log(`[Verification] v3 Region Setup: ${isOversea ? "Oversea" : "CN"}, API Server: ${apiServer}`);

          window.initGeetest(
            {
              gt: captchaId,
              challenge: challenge,
              offline: false,
              new_captcha:
                newCaptchaParam === "1" || newCaptchaParam === "true",
              product: "popup",
              width: "100%",
              language: "zh-tw",
              success: successParam === "1" ? 1 : undefined,
              api_server: apiServer,
            },
            function (captchaObj) {
              loadingSpinner.style.display = "none";
              captchaObj.appendTo("#captcha");

              captchaObj.onSuccess(() => {
                const validate = captchaObj.getValidate();
                const result = {
                  geetest_challenge: validate.geetest_challenge,
                  geetest_validate: validate.geetest_validate,
                  geetest_seccode: validate.geetest_seccode,
                  session_id: aigisSessionId,
                };
                handleCallback(result);
              });
              captchaObj.onReady(() => {
                loadingSpinner.style.display = "none";
                console.log("[Geetest v3] Ready");
              });
              captchaObj.onError((err) => {
                console.error("[Geetest v3] Error detail:", err);
                statusText.textContent = `❌ Geetest v3 載入失敗: ${err.msg || "未知錯誤"}`;
                statusText.style.display = "block";
                loadingSpinner.style.display = "none";

                if (err.msg === "not proof") {
                  statusText.innerHTML = `❌ Geetest v3 發生 not proof 錯誤 <br> <button onclick="window.initGeetest4({captchaId:'${captchaId}',language:'zho',product:'float'}, g4Fallback)" class="retry-btn">嘗試使用 v4 強制加載</button>`;
                }
              });
            },
          );
        }
      }

      function g4Fallback(captchaObj) {
        const captchaContainer = document.querySelector("#captcha");
        captchaContainer.innerHTML = ""; // Clear v3
        captchaObj.appendTo("#captcha");
        captchaObj.onSuccess(() => {
          handleCallback(captchaObj.getValidate());
        });
      }

      function handleCallback(result) {
        if (sessionId) {
          statusText.textContent = "正在同步結果...";
          statusText.style.display = "block";

          fetch("/callback", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              sessionId: sessionId,
              result: result,
            }),
          })
            .then((res) => res.json())
            .then((data) => {
              if (data.success) {
                showSuccess();
              } else {
                showError(result);
              }
            })
            .catch((err) => showError(result));
        } else {
          showError(result, "找不到 Session ID，請複製代碼");
        }
      }

      function showSuccess() {
        mainUi.style.display = "none";
        successUi.style.display = "block";
      }

      function showError(result, msg = "同步失敗，請手動複製結果") {
        statusText.textContent = `❌ ${msg}`;
        statusText.style.display = "block";
        manualArea.style.display = "block";
        outJson.textContent = JSON.stringify(result, null, 2);
      }
    </script>
  </body>
</html>
